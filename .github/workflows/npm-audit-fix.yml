name: Commit fix and push branch
  if: steps.changes.outputs.changed == 'true'
  run: |
    git config user.name  "github-actions[bot]"
    git config user.email "github-actions[bot]@users.noreply.github.com"

    BRANCH="${{ steps.names.outputs.branch }}"

    # Fetch the remote branch if it already exists (reruns/concurrency)
    git fetch origin "${BRANCH}:${BRANCH}" || true

    # If branch exists locally (likely from fetch), check it out and rebase; otherwise create it
    if git show-ref --verify --quiet "refs/heads/${BRANCH}"; then
      git checkout "${BRANCH}"
      git pull --rebase origin "${BRANCH}" || true
    else
      git checkout -b "${BRANCH}"
    fi

    git add "${{ matrix.directory }}/package-lock.json"
    git commit -m "${{ steps.names.outputs.title }}" || exit 0
    git push origin "${BRANCH}".